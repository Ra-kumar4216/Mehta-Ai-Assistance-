<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mehta AI · Intelligent Assistant</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
--primary: #2563eb;
--bg-deep: #0f172a;
--glass-bg: rgba(30, 41, 59, 0.75);
--border-light: rgba(255, 255, 255, 0.08);
--text-light: #f8fafc;
--text-muted: #94a3b8;
--radius-xl: 28px;
}
body {
font-family: 'Inter', system-ui, sans-serif;
background: radial-gradient(ellipse at 30% 40%, #1e293b 0%, #0a0f1c 100%);
color: var(--text-light);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
min-height: 100vh;
padding: 20px;
visibility: hidden;
}
body.auth-ready { visibility: visible; }
.auth-loading {
position: fixed;
inset: 0;
background: radial-gradient(ellipse at 30% 40%, #1e293b 0%, #0a0f1c 100%);
display: flex;
align-items: center;
justify-content: center;
z-index: 9999;
visibility: visible;
}
.auth-loading.hidden { display: none; }
.auth-spinner {
width: 36px; height: 36px;
border: 3px solid rgba(255,255,255,0.15);
border-top-color: #6366f1;
border-radius: 50%;
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.login-wrapper {
width: 100%;
max-width: 520px;
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 12px;
padding: 0 10px;
}
.google-btn {
background: #ffffff;
color: #1f2937;
border: 1px solid rgba(255,255,255,0.2);
padding: 8px 16px;
font-size: 0.9rem;
border-radius: 30px;
cursor: pointer;
font-weight: 600;
display: flex;
align-items: center;
gap: 8px;
}
.logout-btn {
background: rgba(239,68,68,0.15);
color: #fca5a5;
border: 1px solid rgba(239,68,68,0.3);
padding: 6px 14px;
font-size: 0.82rem;
border-radius: 20px;
cursor: pointer;
font-weight: 500;
}
.logout-btn:hover { background: rgba(239,68,68,0.3); }
.welcome-text {
color: #f1f5f9;
font-size: 0.95rem;
font-weight: 500;
background: rgba(255,255,255,0.06);
padding: 6px 14px;
border-radius: 20px;
border: 1px solid rgba(255,255,255,0.05);
}
.brand-logo {
display: flex;
align-items: center;
margin-bottom: 14px;
}
.brand-logo img {
height: 42px;
width: auto;
display: block;
}
.chat-container {
width: 100%;
max-width: 520px;
height: 80vh;
background: var(--glass-bg);
backdrop-filter: blur(20px);
border: 1px solid var(--border-light);
border-radius: var(--radius-xl);
display: flex;
flex-direction: column;
overflow: hidden;
box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
}
.chat-header {
background: rgba(37, 99, 235, 0.12);
padding: 14px 20px;
text-align: center;
font-weight: 620;
font-size: 1.1rem;
border-bottom: 1px solid var(--border-light);
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
}
.chat-header img.header-logo {
height: 28px;
width: auto;
}
.status-dot {
width: 10px; height: 10px;
background: #10b981;
border-radius: 50%;
box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6);
animation: pulseRing 1.8s infinite;
}
@keyframes pulseRing {
0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
}
.chat-messages {
flex: 1;
padding: 22px 18px;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 14px;
scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 20px; }
.message {
max-width: 82%;
padding: 12px 18px;
border-radius: 24px;
line-height: 1.5;
word-break: break-word;
font-size: 0.95rem;
position: relative;
animation: messageSlideIn 0.3s ease;
}
@keyframes messageSlideIn {
from { opacity: 0; transform: translateY(18px) scale(0.96); }
to { opacity: 1; transform: translateY(0) scale(1); }
}
.user {
background: linear-gradient(125deg, #2563eb, #1e40af);
align-self: flex-end;
color: white;
border-bottom-right-radius: 6px;
}
.bot {
background: rgba(255,255,255,0.05);
align-self: flex-start;
color: #eef2ff;
border-bottom-left-radius: 6px;
border: 1px solid rgba(255,255,255,0.06);
padding-bottom: 40px;
}
.code-container {
position: relative;
margin: 12px 0 8px;
border-radius: 14px;
overflow: hidden;
background: #0a0e1a;
border: 1px solid rgba(59,130,246,0.3);
}
.bot pre {
background: #0a0e1a !important;
padding: 32px 12px 12px 12px;
overflow-x: auto;
margin: 0;
font-size: 0.8rem;
}
.bot code { font-family: 'Fira Code', monospace; color: #7dd3fc; }
.code-copy-btn, .copy-btn {
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.15);
color: #90cdf4;
font-size: 0.7rem;
padding: 4px 10px;
border-radius: 30px;
cursor: pointer;
}
.code-copy-btn { position: absolute; top: 6px; right: 8px; }
.bot-actions { position: absolute; bottom: 8px; right: 12px; display: flex; gap: 8px; }
.chat-image {
max-width: 180px; max-height: 180px;
border-radius: 18px; margin-bottom: 8px;
border: 1px solid rgba(255,255,255,0.2);
display: block;
}
.preview-container {
display: none;
padding: 10px 20px;
background: rgba(15,23,42,0.7);
align-items: center;
gap: 12px;
border-top: 1px solid var(--border-light);
}
.preview-img { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; }
.remove-btn {
background: #ef4444cc;
border: none; color: white;
border-radius: 40px;
width: 26px; height: 26px;
cursor: pointer; font-size: 0.9rem;
}
.chat-input-area {
display: flex;
padding: 14px 18px 18px;
background: rgba(15,23,42,0.5);
gap: 10px;
align-items: center;
border-top: 1px solid var(--border-light);
}
input[type="text"] {
flex: 1;
padding: 14px 16px;
background: rgba(0,0,0,0.4);
border: 1px solid var(--border-light);
border-radius: 32px;
color: white;
font-size: 0.95rem;
outline: none;
}
input[type="text"]::placeholder { color: var(--text-muted); }
input[type="text"].limit-reached {
border-color: rgba(239,68,68,0.5);
}
input[type="text"].limit-reached::placeholder {
color: #fca5a5;
}
.attach-btn, .mic-btn {
background: rgba(255,255,255,0.05);
border: 1px solid var(--border-light);
color: #b9c7db;
width: 48px; height: 48px;
border-radius: 40px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-size: 1.1rem;
flex-shrink: 0;
}
button.send-btn {
background: linear-gradient(105deg, #2563eb, #1e40af);
border: none; color: white;
padding: 12px 24px;
border-radius: 40px;
cursor: pointer;
font-weight: 600;
flex-shrink: 0;
}
button.send-btn:disabled {
opacity: 0.5;
cursor: not-allowed;
}
.clear-btn {
background: rgba(255,255,255,0.06);
color: var(--text-muted);
border: 1px solid rgba(255,255,255,0.08);
padding: 6px 14px;
font-size: 0.8rem;
border-radius: 20px;
cursor: pointer;
}
.thinking-dots::after {
content: '...';
display: inline-block;
animation: blinkDots 1.2s infinite;
width: 24px;
letter-spacing: 2px;
}
@keyframes blinkDots {
0% { opacity: 0.3; content: '.'; }
33% { opacity: 0.8; content: '..'; }
66% { opacity: 1; content: '...'; }
100% { opacity: 0.3; content: '.'; }
}
.right-controls { display: flex; gap: 8px; align-items: center; }
</style>
</head>

--glass-bg: rgba(30, 41, 59, 0.75);
--border-light: rgba(255, 255, 255, 0.08);
--text-light: #f8fafc;
--text-muted: #94a3b8;
--radius-xl: 28px;
}
body {
font-family: 'Inter', system-ui, sans-serif;
background: radial-gradient(ellipse at 30% 40%, #1e293b 0%, #0a0f1c 100%);
color: var(--text-light);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
min-height: 100vh;
padding: 20px;
visibility: hidden;
}
body.auth-ready { visibility: visible; }
.auth-loading {
position: fixed;
inset: 0;
background: radial-gradient(ellipse at 30% 40%, #1e293b 0%, #0a0f1c 100%);
display: flex;
align-items: center;
justify-content: center;
z-index: 9999;
visibility: visible;
}
.auth-loading.hidden { display: none; }
.auth-spinner {
width: 36px; height: 36px;
border: 3px solid rgba(255,255,255,0.15);
border-top-color: #6366f1;
border-radius: 50%;
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.login-wrapper {
width: 100%;
max-width: 520px;
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 12px;
padding: 0 10px;
}
.google-btn {
background: #ffffff;
color: #1f2937;
border: 1px solid rgba(255,255,255,0.2);
padding: 8px 16px;
font-size: 0.9rem;
border-radius: 30px;
cursor: pointer;
font-weight: 600;
display: flex;
align-items: center;
gap: 8px;
}
.logout-btn {
background: rgba(239,68,68,0.15);
color: #fca5a5;
border: 1px solid rgba(239,68,68,0.3);
padding: 6px 14px;
font-size: 0.82rem;
border-radius: 20px;
cursor: pointer;
font-weight: 500;
}
.logout-btn:hover { background: rgba(239,68,68,0.3); }
.welcome-text {
color: #f1f5f9;
font-size: 0.95rem;
font-weight: 500;
background: rgba(255,255,255,0.06);
padding: 6px 14px;
border-radius: 20px;
border: 1px solid rgba(255,255,255,0.05);
}
.brand-logo {
display: flex;
align-items: center;
margin-bottom: 14px;
}
.brand-logo img {
height: 42px;
width: auto;
display: block;
}
.chat-container {
width: 100%;
max-width: 520px;
height: 80vh;
background: var(--glass-bg);
backdrop-filter: blur(20px);
border: 1px solid var(--border-light);
border-radius: var(--radius-xl);
display: flex;
flex-direction: column;
overflow: hidden;
box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
}
.chat-header {
background: rgba(37, 99, 235, 0.12);
padding: 14px 20px;
text-align: center;
font-weight: 620;
font-size: 1.1rem;
border-bottom: 1px solid var(--border-light);
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
}
.chat-header img.header-logo {
height: 28px;
width: auto;
}
.status-dot {
width: 10px; height: 10px;
background: #10b981;
border-radius: 50%;
box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6);
animation: pulseRing 1.8s infinite;
}
@keyframes pulseRing {
0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
}
.chat-messages {
flex: 1;
padding: 22px 18px;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 14px;
scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 20px; }
.message {
max-width: 82%;
padding: 12px 18px;
border-radius: 24px;
line-height: 1.5;
word-break: break-word;
font-size: 0.95rem;
position: relative;
animation: messageSlideIn 0.3s ease;
}
@keyframes messageSlideIn {
from { opacity: 0; transform: translateY(18px) scale(0.96); }
to { opacity: 1; transform: translateY(0) scale(1); }
}
.user {
background: linear-gradient(125deg, #2563eb, #1e40af);
align-self: flex-end;
color: white;
border-bottom-right-radius: 6px;
}
.bot {
background: rgba(255,255,255,0.05);
align-self: flex-start;
color: #eef2ff;
border-bottom-left-radius: 6px;
border: 1px solid rgba(255,255,255,0.06);
padding-bottom: 40px;
}
.code-container {
position: relative;
margin: 12px 0 8px;
border-radius: 14px;
overflow: hidden;
background: #0a0e1a;
border: 1px solid rgba(59,130,246,0.3);
}
.bot pre {
background: #0a0e1a !important;
padding: 32px 12px 12px 12px;
overflow-x: auto;
margin: 0;
font-size: 0.8rem;
}
.bot code { font-family: 'Fira Code', monospace; color: #7dd3fc; }
.code-copy-btn, .copy-btn {
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.15);
color: #90cdf4;
font-size: 0.7rem;
padding: 4px 10px;
border-radius: 30px;
cursor: pointer;
}
.code-copy-btn { position: absolute; top: 6px; right: 8px; }
.bot-actions { position: absolute; bottom: 8px; right: 12px; display: flex; gap: 8px; }
.chat-image {
max-width: 180px; max-height: 180px;
border-radius: 18px; margin-bottom: 8px;
border: 1px solid rgba(255,255,255,0.2);
display: block;
}
.preview-container {
display: none;
padding: 10px 20px;
background: rgba(15,23,42,0.7);
align-items: center;
gap: 12px;
border-top: 1px solid var(--border-light);
}
.preview-img { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; }
.remove-btn {
background: #ef4444cc;
border: none; color: white;
border-radius: 40px;
width: 26px; height: 26px;
cursor: pointer; font-size: 0.9rem;
}
.chat-input-area {
display: flex;
padding: 14px 18px 18px;
background: rgba(15,23,42,0.5);
gap: 10px;
align-items: center;
border-top: 1px solid var(--border-light);
}
input[type="text"] {
flex: 1;
padding: 14px 16px;
background: rgba(0,0,0,0.4);
border: 1px solid var(--border-light);
border-radius: 32px;
color: white;
font-size: 0.95rem;
outline: none;
}
input[type="text"]::placeholder { color: var(--text-muted); }
input[type="text"].limit-reached {
border-color: rgba(239,68,68,0.5);
}
input[type="text"].limit-reached::placeholder {
color: #fca5a5;
}
.attach-btn, .mic-btn {
background: rgba(255,255,255,0.05);
border: 1px solid var(--border-light);
color: #b9c7db;
width: 48px; height: 48px;
border-radius: 40px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-size: 1.1rem;
flex-shrink: 0;
}
button.send-btn {
background: linear-gradient(105deg, #2563eb, #1e40af);
border: none; color: white;
padding: 12px 24px;
border-radius: 40px;
cursor: pointer;
font-weight: 600;
flex-shrink: 0;
}
button.send-btn:disabled {
opacity: 0.5;
cursor: not-allowed;
}
.clear-btn {
background: rgba(255,255,255,0.06);
color: var(--text-muted);
border: 1px solid rgba(255,255,255,0.08);
padding: 6px 14px;
font-size: 0.8rem;
border-radius: 20px;
cursor: pointer;
}
.thinking-dots::after {
content: '...';
display: inline-block;
animation: blinkDots 1.2s infinite;
width: 24px;
letter-spacing: 2px;
}
@keyframes blinkDots {
0% { opacity: 0.3; content: '.'; }
33% { opacity: 0.8; content: '..'; }
66% { opacity: 1; content: '...'; }
100% { opacity: 0.3; content: '.'; }
}
.right-controls { display: flex; gap: 8px; align-items: center; }
</style>
</head>

background: #10b981;
border-radius: 50%;
box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6);
animation: pulseRing 1.8s infinite;
}
@keyframes pulseRing {
0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
}
.chat-messages {
flex: 1;
padding: 22px 18px;
overflow-y: auto;
display: flex;
flex-direction: column;
gap: 14px;
scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 20px; }
.message {
max-width: 82%;
padding: 12px 18px;
border-radius: 24px;
line-height: 1.5;
word-break: break-word;
font-size: 0.95rem;
position: relative;
animation: messageSlideIn 0.3s ease;
}
@keyframes messageSlideIn {
from { opacity: 0; transform: translateY(18px) scale(0.96); }
to { opacity: 1; transform: translateY(0) scale(1); }
}
.user {
background: linear-gradient(125deg, #2563eb, #1e40af);
align-self: flex-end;
color: white;
border-bottom-right-radius: 6px;
}
.bot {
background: rgba(255,255,255,0.05);
align-self: flex-start;
color: #eef2ff;
border-bottom-left-radius: 6px;
border: 1px solid rgba(255,255,255,0.06);
padding-bottom: 40px;
}
.code-container {
position: relative;
margin: 12px 0 8px;
border-radius: 14px;
overflow: hidden;
background: #0a0e1a;
border: 1px solid rgba(59,130,246,0.3);
}
.bot pre {
background: #0a0e1a !important;
padding: 32px 12px 12px 12px;
overflow-x: auto;
margin: 0;
font-size: 0.8rem;
}
.bot code { font-family: 'Fira Code', monospace; color: #7dd3fc; }
.code-copy-btn, .copy-btn {
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.15);
color: #90cdf4;
font-size: 0.7rem;
padding: 4px 10px;
border-radius: 30px;
cursor: pointer;
}
.code-copy-btn { position: absolute; top: 6px; right: 8px; }
.bot-actions { position: absolute; bottom: 8px; right: 12px; display: flex; gap: 8px; }
.chat-image {
max-width: 180px; max-height: 180px;
border-radius: 18px; margin-bottom: 8px;
border: 1px solid rgba(255,255,255,0.2);
display: block;
}
.preview-container {
display: none;
padding: 10px 20px;
background: rgba(15,23,42,0.7);
align-items: center;
gap: 12px;
border-top: 1px solid var(--border-light);
}
.preview-img { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; }
.remove-btn {
background: #ef4444cc;
border: none; color: white;
border-radius: 40px;
width: 26px; height: 26px;
cursor: pointer; font-size: 0.9rem;
}
.chat-input-area {
display: flex;
padding: 14px 18px 18px;
background: rgba(15,23,42,0.5);
gap: 10px;
align-items: center;
border-top: 1px solid var(--border-light);
}
input[type="text"] {
flex: 1;
padding: 14px 16px;
background: rgba(0,0,0,0.4);
border: 1px solid var(--border-light);
border-radius: 32px;
color: white;
font-size: 0.95rem;
outline: none;
}
input[type="text"]::placeholder { color: var(--text-muted); }
input[type="text"].limit-reached {
border-color: rgba(239,68,68,0.5);
}
input[type="text"].limit-reached::placeholder {
color: #fca5a5;
}
.attach-btn, .mic-btn {
background: rgba(255,255,255,0.05);
border: 1px solid var(--border-light);
color: #b9c7db;
width: 48px; height: 48px;
border-radius: 40px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-size: 1.1rem;
flex-shrink: 0;
}
button.send-btn {
background: linear-gradient(105deg, #2563eb, #1e40af);
border: none; color: white;
padding: 12px 24px;
border-radius: 40px;
cursor: pointer;
font-weight: 600;
flex-shrink: 0;
}
button.send-btn:disabled {
opacity: 0.5;
cursor: not-allowed;
}
.clear-btn {
background: rgba(255,255,255,0.06);
color: var(--text-muted);
border: 1px solid rgba(255,255,255,0.08);
padding: 6px 14px;
font-size: 0.8rem;
border-radius: 20px;
cursor: pointer;
}
.thinking-dots::after {
content: '...';
display: inline-block;
animation: blinkDots 1.2s infinite;
width: 24px;
letter-spacing: 2px;
}
@keyframes blinkDots {
0% { opacity: 0.3; content: '.'; }
33% { opacity: 0.8; content: '..'; }
66% { opacity: 1; content: '...'; }
100% { opacity: 0.3; content: '.'; }
}
.right-controls { display: flex; gap: 8px; align-items: center; }
</style>
</head>
