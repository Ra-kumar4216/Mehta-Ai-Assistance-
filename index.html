<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehta AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 450px; height: 600px; background: #1e1e1e; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 8px 24px rgba(0,0,0,0.5); overflow: hidden; }
        .chat-header { background: #2563eb; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 10px 14px; border-radius: 8px; margin: 2px 0; line-height: 1.4; word-wrap: break-word; display: flex; flex-direction: column; }
        .user { background: #2563eb; align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        .bot { background: #333; align-self: flex-start; color: #f3f4f6; border-bottom-left-radius: 2px; }
        
        /* 📸 Image Preview Area Styling */
        .preview-container { display: none; padding: 10px 15px; background: #1a1a1a; align-items: center; gap: 10px; border-bottom: 1px solid #2d2d2d; }
        .preview-img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; border: 1px solid #2563eb; }
        .remove-btn { background: #ef4444; border: none; color: white; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 0.8rem; display: flex; justify-content: center; align-items: center; }

        .chat-input-area { display: flex; padding: 15px; background: #1a1a1a; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; background: #2d2d2d; border: none; border-radius: 6px; color: white; font-size: 1rem; }
        input:focus { outline: 2px solid #2563eb; }
        
        /* 📎 Attachment Button Styling */
        .attach-btn { background: #333; border: none; color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .attach-btn:hover { background: #444; }
        
        button.send-btn { background: #2563eb; border: none; color: white; padding: 12px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button.send-btn:hover { background: #1d4ed8; }
        
        /* Chat me image dikhane ke liye styling */
        .chat-image { max-width: 100%; border-radius: 6px; margin-bottom: 6px; display: block; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🎙️ Mehta AI Assistant</div>
    <div class="chat-messages" id="chat-box">
        <div class="message bot">Hello! I'm Mehta, your voice assistant. How can I help you today?</div>
    </div>
    
    <div class="preview-container" id="preview-area">
        <img src="" id="img-preview" class="preview-img">
        <span style="font-size: 0.9rem; color: #aaa;">Photo attached</span>
        <button class="remove-btn" onclick="clearImage()">×</button>
    </div>

    <div class="chat-input-area">
        <input type="file" id="image-input" accept="image/*" style="display: none;" onchange="handleImageSelect()">
        <button class="attach-btn" onclick="document.getElementById('image-input').click()">📎</button>
        
        <input type="text" id="user-input" placeholder="Type message or attach image..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let selectedBase64Image = null;

    // 📸 Photo select hone par preview dikhane ka logic
    function handleImageSelect() {
        const file = document.getElementById("image-input").files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("img-preview").src = e.target.result;
            document.getElementById("preview-area").style.display = "flex";
            
            // Base64 string nikalna (Data URL ka part hatakar sirf pure base64 lena)
            selectedBase64Image = e.target.result.split(',')[1];
        };
        reader.readAsDataURL(file);
    }

    // ❌ Attached photo ko hatane ka logic
    function clearImage() {
        document.getElementById("image-input").value = "";
        document.getElementById("img-preview").src = "";
        document.getElementById("preview-area").style.display = "none";
        selectedBase64Image = null;
    }

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const messageText = inputField.value.trim();
        
        // Agar na message hai aur na photo, toh send nahi hoga
        if (!messageText && !selectedBase64Image) return;

        // User Message UI create karna
        const userDiv = document.createElement("div");
        userDiv.className = "message user";
        
        // 📸 1. PHOTO PEHLE AAYEGI (If Available)
        if (selectedBase64Image) {
            const imgElement = document.createElement("img");
            imgElement.src = `data:image/jpeg;base64,${selectedBase64Image}`;
            imgElement.className = "chat-image";
            userDiv.appendChild(imgElement);
        }
        
        // 💬 2. SEWAL (TEXT) PHIR USKE THIK NEECHE AAYEGA
        if (messageText) {
            const textSpan = document.createElement("span");
            textSpan.innerText = messageText;
            userDiv.appendChild(textSpan);
        }
        
        chatBox.appendChild(userDiv);
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // Ek variable me current image save karke preview clear kar dena
        const imageToSend = selectedBase64Image;
        clearImage();

        // Bot Thinking UI
        const botDiv = document.createElement("div");
        botDiv.className = "message bot";
        botDiv.innerText = "Thinking...";
        chatBox.appendChild(botDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // Vercel Live API Call
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    message: messageText,
                    image: imageToSend 
                })
            });
            
            const data = await response.json();
            botDiv.innerText = data.reply || data.error || "Something went wrong.";
        } catch (error) {
            botDiv.innerText = "Error connecting to server.";
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
