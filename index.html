<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mehta AI · Intelligent Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #2563eb;
            --primary-glow: #3b82f6;
            --bg-deep: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.75);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
            --radius-xl: 28px;
            --ease-bounce: cubic-bezier(0.34, 1.2, 0.64, 1);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #1e293b 0%, #0a0f1c 100%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 520px;
            height: 85vh;
            max-height: 780px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            position: relative;
        }

        .chat-header {
            background: rgba(37, 99, 235, 0.12);
            padding: 16px 20px;
            text-align: center;
            font-weight: 620;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .status-dot {
            width: 10px; height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: pulseRing 1.8s infinite;
        }
        @keyframes pulseRing {
            0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); }
            70%  { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
            100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
        }

        .error-banner {
            display: none;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5;
            font-size: 0.8rem;
            padding: 8px 16px;
            text-align: center;
            flex-shrink: 0;
        }
        .error-banner.show { display: block; }

        .chat-messages {
            flex: 1;
            padding: 22px 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 20px; }

        .message {
            max-width: 82%;
            padding: 12px 18px;
            border-radius: 24px;
            line-height: 1.55;
            word-break: break-word;
            font-size: 0.95rem;
            position: relative;
            animation: messageSlideIn 0.3s var(--ease-bounce);
        }
        @keyframes messageSlideIn {
            from { opacity: 0; transform: translateY(14px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @media (prefers-reduced-motion: reduce) { .message { animation: none; } }

        .user {
            background: linear-gradient(125deg, #2563eb, #1e40af);
            align-self: flex-end;
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 6px 14px rgba(37,99,235,0.25);
        }
        .bot {
            background: rgba(255,255,255,0.05);
            align-self: flex-start;
            color: #eef2ff;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 40px;
        }
        .bot.error-msg {
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.3);
            color: #fca5a5;
        }

        .code-container {
            position: relative;
            margin: 12px 0 8px;
            border-radius: 14px;
            overflow: hidden;
            background: #0a0e1a;
            border: 1px solid rgba(59,130,246,0.3);
        }
        .bot pre {
            background: #0a0e1a !important;
            padding: 32px 12px 12px;
            overflow-x: auto;
            margin: 0;
            font-size: 0.8rem;
        }
        .bot code { font-family: 'Fira Code','Courier New',monospace; color: #7dd3fc; }
        .code-copy-btn {
            position: absolute; top: 6px; right: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #90cdf4; font-size: 0.7rem;
            padding: 4px 10px; border-radius: 30px;
            cursor: pointer; transition: 0.2s; font-weight: 500;
        }
        .code-copy-btn:hover { background: var(--primary); color: white; }

        .bot-actions { position: absolute; bottom: 8px; right: 12px; display: flex; gap: 8px; }
        .copy-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted); font-size: 0.7rem;
            padding: 4px 10px; border-radius: 30px;
            cursor: pointer; transition: 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .copy-btn:hover { background: rgba(59,130,246,0.3); color: white; }

        .chat-image {
            max-width: 180px; max-height: 180px;
            border-radius: 18px; margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .preview-container {
            display: none; padding: 10px 20px;
            background: rgba(15,23,42,0.7);
            align-items: center; gap: 12px;
            border-top: 1px solid var(--border-light);
            flex-shrink: 0;
        }
        .preview-img { width: 44px; height: 44px; object-fit: cover; border-radius: 12px; border: 1px solid var(--primary); }
        .remove-btn {
            background: #ef4444cc; border: none; color: white;
            border-radius: 40px; width: 26px; height: 26px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .remove-btn:hover { background: #dc2626; }

        .chat-input-area {
            display: flex; padding: 14px 18px 18px;
            background: rgba(15,23,42,0.5);
            gap: 10px; align-items: center;
            border-top: 1px solid var(--border-light);
            flex-shrink: 0;
        }

        input[type="text"] {
            flex: 1; padding: 14px 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-light);
            border-radius: 32px; color: white; font-size: 0.95rem;
            transition: 0.2s;
        }
        input[type="text"]:focus {
            outline: none; border-color: var(--primary);
            background: rgba(37,99,235,0.1);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
        }
        input[type="text"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .attach-btn, .mic-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-light);
            color: #b9c7db; width: 48px; height: 48px;
            border-radius: 40px; cursor: pointer;
            font-size: 1.3rem; transition: 0.2s var(--ease-out);
            display: flex; align-items: center; justify-content: center;
        }
        .attach-btn:hover, .mic-btn:hover { background: rgba(37,99,235,0.3); color: white; transform: translateY(-2px); }
        .attach-btn:disabled, .mic-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .mic-btn.recording { background: #ef4444; color: white; border-color: #ef4444; animation: micPulse 0.8s infinite alternate; }
        @keyframes micPulse { from { box-shadow: 0 0 2px #ef4444; } to { box-shadow: 0 0 14px #ef4444; } }

        button.send-btn {
            background: linear-gradient(105deg, #2563eb, #1e40af);
            border: none; color: white; padding: 12px 22px;
            border-radius: 40px; font-weight: 600; font-size: 0.9rem;
            cursor: pointer; transition: 0.2s var(--ease-out);
            min-width: 72px;
        }
        button.send-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -5px #1e3a8a80; }
        button.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .thinking-dots::after {
            content: '...'; display: inline-block;
            animation: blinkDots 1.2s infinite; width: 24px; letter-spacing: 2px;
        }
        @keyframes blinkDots {
            0%   { opacity: 0.3; content: '.'; }
            33%  { opacity: 0.8; content: '..'; }
            66%  { opacity: 1;   content: '...'; }
            100% { opacity: 0.3; content: '.'; }
        }

        .scroll-to-bottom {
            position: absolute; bottom: 90px; right: 20px;
            background: #2563ebcc; backdrop-filter: blur(12px);
            border-radius: 60px; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
            transition: 0.2s; opacity: 0; pointer-events: none; z-index: 12;
        }
        .scroll-to-bottom.show { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <span class="status-dot"></span>
        Mehta AI Assistant
    </div>

    <div class="error-banner" id="error-banner">⚠️ <span id="error-text"></span></div>

    <div class="chat-messages" id="chat-box">
        <div class="message bot">✨ Hello! I'm Mehta AI. Ask me anything — in Hindi, English, or Hinglish. You can also share images or use your voice!</div>
    </div>

    <div class="preview-container" id="preview-area">
        <img src="" id="img-preview" class="preview-img" alt="preview">
        <span style="font-size:0.85rem;color:#cbd5e1;flex:1">Image ready to send</span>
        <button class="remove-btn" onclick="clearImage()" aria-label="Remove image">✕</button>
    </div>

    <div class="chat-input-area">
        <input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleImageSelect()">
        <button class="attach-btn" id="attach-btn" onclick="document.getElementById('image-input').click()" aria-label="Attach image">📎</button>
        <button class="mic-btn" id="mic-button" onclick="toggleVoiceInput()" aria-label="Voice input">🎙️</button>
        <input type="text" id="user-input" placeholder="Type or speak..." onkeypress="if(event.key==='Enter'&&!isLoading)sendMessage()" autocomplete="off">
        <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div class="scroll-to-bottom" id="scrollToBottomBtn" onclick="scrollChatToBottom()">↓</div>
</div>

<script>
    let selectedBase64Image = null;
    let recognition = null;
    let isRecording = false;
    let isLoading = false;
    let conversationHistory = [];
    const MAX_HISTORY = 12;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-IN';
        recognition.onstart = () => {
            isRecording = true;
            document.getElementById("mic-button").classList.add("recording");
            document.getElementById("user-input").placeholder = "🎙️ Bol raha hoon...";
        };
        recognition.onresult = (event) => {
            document.getElementById("user-input").value = event.results[0][0].transcript;
        };
        recognition.onerror = () => stopRecording();
        recognition.onend = () => stopRecording();
    } else {
        const micBtn = document.getElementById("mic-button");
        if (micBtn) micBtn.style.display = "none";
    }

    function stopRecording() {
        isRecording = false;
        document.getElementById("mic-button").classList.remove("recording");
        document.getElementById("user-input").placeholder = "Type or speak...";
    }

    function toggleVoiceInput() {
        if (!recognition || isLoading) return;
        if (isRecording) { recognition.stop(); } else {
            document.getElementById("user-input").value = "";
            recognition.start();
        }
    }

    function handleImageSelect() {
        const file = document.getElementById("image-input").files[0];
        if (!file) return;
        if (file.size > 4 * 1024 * 1024) {
            showError("Image too large. Please use an image under 4MB.");
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById("img-preview").src = e.target.result;
            document.getElementById("preview-area").style.display = "flex";
            selectedBase64Image = e.target.result.split(',')[1];
        };
        reader.readAsDataURL(file);
    }

    function clearImage() {
        document.getElementById("image-input").value = "";
        document.getElementById("img-preview").src = "";
        document.getElementById("preview-area").style.display = "none";
        selectedBase64Image = null;
    }

    function showError(msg) {
        const banner = document.getElementById("error-banner");
        document.getElementById("error-text").textContent = msg;
        banner.classList.add("show");
        setTimeout(() => banner.classList.remove("show"), 6000);
    }

    function setLoading(state) {
        isLoading = state;
        const sendBtn = document.getElementById("send-btn");
        const inputField = document.getElementById("user-input");
        const attachBtn = document.getElementById("attach-btn");
        sendBtn.disabled = state;
        inputField.disabled = state;
        attachBtn.disabled = state;
        sendBtn.innerHTML = state ? '<span class="spinner"></span>' : 'Send';
    }

    function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const orig = btn.innerText;
            btn.innerText = "✓ Copied!";
            btn.style.background = "#10b981";
            btn.style.color = "white";
            setTimeout(() => { btn.innerText = orig; btn.style.background = ""; btn.style.color = ""; }, 1800);
        });
    }

    const chatBox = document.getElementById("chat-box");
    const scrollBtn = document.getElementById("scrollToBottomBtn");

    function checkScrollVisibility() {
        const isNearBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 120;
        scrollBtn.classList.toggle("show", !isNearBottom);
    }

    function scrollChatToBottom() {
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    chatBox.addEventListener("scroll", checkScrollVisibility);

    function renderMarkdown(replyText, botDiv) {
        botDiv.innerHTML = marked.parse(replyText);
        botDiv.querySelectorAll("pre").forEach(pre => {
            const wrapper = document.createElement("div");
            wrapper.className = "code-container";
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);
            const code = pre.querySelector("code") ? pre.querySelector("code").innerText : pre.innerText;
            const btn = document.createElement("button");
            btn.className = "code-copy-btn";
            btn.innerText = "Copy Code 📋";
            btn.onclick = (e) => { e.stopPropagation(); copyToClipboard(code, btn); };
            wrapper.appendChild(btn);
        });
        const actions = document.createElement("div");
        actions.className = "bot-actions";
        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.innerHTML = "Copy 📋";
        copyBtn.onclick = () => copyToClipboard(replyText, copyBtn);
        actions.appendChild(copyBtn);
        botDiv.appendChild(actions);
    }

    async function sendMessage() {
        if (isLoading) return;
        const inputField = document.getElementById("user-input");
        const messageText = inputField.value.trim();
        if (!messageText && !selectedBase64Image) return;

        const userDiv = document.createElement("div");
        userDiv.className = "message user";
        if (selectedBase64Image) {
            const img = document.createElement("img");
            img.src = `data:image/jpeg;base64,${selectedBase64Image}`;
            img.className = "chat-image";
            userDiv.appendChild(img);
        }
        if (messageText) {
            const span = document.createElement("span");
            span.innerText = messageText;
            userDiv.appendChild(span);
        }
        chatBox.appendChild(userDiv);

        if (messageText) {
            conversationHistory.push({ role: "user", content: messageText });
            if (conversationHistory.length > MAX_HISTORY)
                conversationHistory = conversationHistory.slice(-MAX_HISTORY);
        }

        const imagePayload = selectedBase64Image;
        inputField.value = "";
        clearImage();
        setLoading(true);

        const botDiv = document.createElement("div");
        botDiv.className = "message bot";
        const thinking = document.createElement("span");
        thinking.className = "thinking-dots";
        thinking.innerText = "Mehta soch raha hai";
        botDiv.appendChild(thinking);
        chatBox.appendChild(botDiv);
        scrollChatToBottom();

        try {
            const baseUrl = window.location.origin;
            const response = await fetch(`${baseUrl}/api/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: messageText,
                    image: imagePayload,
                    history: conversationHistory.slice(0, -1)
                })
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error || `HTTP ${response.status}`);
            }

            const data = await response.json();
            if (data.error) throw new Error(data.error);

            const replyText = data.reply || "Unexpected response. Please try again.";
            botDiv.innerHTML = "";
            renderMarkdown(replyText, botDiv);

            conversationHistory.push({ role: "assistant", content: replyText });
            if (conversationHistory.length > MAX_HISTORY)
                conversationHistory = conversationHistory.slice(-MAX_HISTORY);

        } catch (error) {
            console.error("API Error:", error);
            botDiv.innerHTML = "";
            botDiv.classList.add("error-msg");
            botDiv.innerHTML = `⚠️ ${error.message || "Network error. Please try again."}`;
            showError(error.message || "Something went wrong.");
        } finally {
            setLoading(false);
            scrollChatToBottom();
            checkScrollVisibility();
        }
    }

    window.onload = () => {
        scrollChatToBottom();
        document.getElementById("user-input").focus();
    };
</script>
</body>
</html>
