<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mehta AI · Intelligent Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #2563eb;
            --primary-glow: #3b82f6;
            --bg-deep: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.75);
            --border-light: rgba(255, 255, 255, 0.08);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --ease-bounce: cubic-bezier(0.34, 1.2, 0.64, 1);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.25s var(--ease-out);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #1e293b 0%, #0a0f1c 100%);
            color: var(--text-light);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==================== GLASSMORPHISM LOGIN ==================== */
        .neural-bg {
            background: radial-gradient(circle at 50% 30%, rgba(59, 130, 246, 0.18), transparent 70%);
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatParticle 20s linear infinite;
            opacity: 0.7;
            z-index: 1;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.6); }
            100% { transform: translateY(-100vh) scale(1.8); }
        }

        .glass {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(148, 163, 184, 0.25);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
        }

        .ai-glow {
            animation: aiPulse 4s ease-in-out infinite;
        }

        @keyframes aiPulse {
            0%, 100% { filter: drop-shadow(0 0 25px rgb(59 130 246)); }
            50% { filter: drop-shadow(0 0 45px rgb(147 51 234)); }
        }

        .input-focus {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-focus:focus {
            transform: translateY(-3px);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.4);
            border-color: rgb(59 130 246);
        }

        /* Original styles continue... */
        .login-wrapper, .chat-container { /* existing styles */ }
        /* ... (baaki pura original CSS yahin rahega) ... */
    </style>
</head>
<body class="neural-bg">

<!-- Particles -->
<div id="particles" class="absolute inset-0 pointer-events-none"></div>

<!-- ==================== LOGIN SCREEN ==================== -->
<div id="login-screen" class="w-full max-w-md mx-auto">
    <div class="glass rounded-3xl p-8 md:p-10 shadow-2xl relative border border-slate-700/50">
        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="ai-glow">
                <img src="https://photos.app.goo.gl/pR9y6DmTainktCYG9" alt="Mehta.ai" class="w-28 h-28 object-contain">
            </div>
        </div>

        <h2 class="text-4xl font-semibold text-center text-white mb-2">Sign in to Mehta.ai</h2>
        <p class="text-center text-slate-400 mb-10">Access your intelligent workspace</p>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Email or Username</label>
                <div class="relative">
                    <div class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <input type="text" id="email" value="demo@mehta.ai"
                        class="input-focus w-full bg-slate-900/70 border border-slate-600 rounded-3xl px-12 py-5 text-white placeholder:text-slate-500 focus:outline-none text-lg"
                        placeholder="you@mehta.ai" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <div class="relative">
                    <div class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="password" value="mehta2026"
                        class="input-focus w-full bg-slate-900/70 border border-slate-600 rounded-3xl px-12 py-5 text-white placeholder:text-slate-500 focus:outline-none text-lg"
                        placeholder="••••••••" required>
                    <button type="button" onclick="togglePassword()" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white">
                        <i id="eyeIcon" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="loginBtn"
                class="w-full bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 hover:brightness-110 text-white font-semibold py-5 rounded-3xl text-lg shadow-xl">
                Sign In
            </button>
        </form>

        <!-- Google Sign In -->
        <div class="mt-6">
            <button onclick="fakeGoogleLogin()" 
                    class="w-full glass hover:bg-slate-800/70 transition-all py-5 rounded-3xl flex justify-center items-center gap-3 text-white border border-slate-600 text-lg font-semibold">
                <i class="fa-brands fa-google text-red-400 text-2xl"></i>
                <span>Sign in with Google</span>
            </button>
        </div>
    </div>
</div>

    <div class="chat-container">

    </div>

<script>
    // ==================== PARTICLES ====================
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 70; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 5 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.background = `hsl(${Math.random()*80 + 210}, 90%, 75%)`;
            particle.style.animationDuration = `${Math.random() * 22 + 16}s`;
            particle.style.animationDelay = `-${Math.random() * 30}s`;
            container.appendChild(particle);
        }
    }

    // ==================== PASSWORD TOGGLE ====================
    function togglePassword() {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            pwd.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function fakeGoogleLogin() {
        // Trigger original Google login
        document.getElementById('google-login-btn').click();
    }

    // ==================== SHOW/HIDE LOGIN vs CHAT ====================
    function showChat() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('chat-app').classList.remove('hidden');
    }

    // Aapka original script yahan paste kar do (supabase, chat logic etc.)
    // Main code ko touch nahi kiya — sirf login screen add kiya hai

    window.onload = () => {
        createParticles();
        
        // Example: Agar already logged in hai to direct chat dikhao
        // setTimeout(() => showChat(), 800);   // testing ke liye
    };
</script>
