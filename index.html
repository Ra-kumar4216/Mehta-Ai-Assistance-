<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehta AI Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); 
            color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        .chat-container { 
            width: 100%;
            max-width: 480px; 
            height: 85vh; 
            max-height: 700px;
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); 
            overflow: hidden; 
            margin: 20px;
        }

        .chat-header { 
            background: rgba(37, 99, 235, 0.15); 
            padding: 18px; 
            text-align: center; 
            font-size: 1.15rem; 
            font-weight: 600; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            letter-spacing: 0.5px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .chat-header::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulse 1.6s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .chat-messages { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

        .message { 
            max-width: 80%; 
            padding: 12px 16px; 
            border-radius: 16px; 
            line-height: 1.5; 
            word-wrap: break-word; 
            display: flex; 
            flex-direction: column; 
            font-size: 0.95rem;
            position: relative;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user { 
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); 
            align-self: flex-end; 
            color: #ffffff; 
            border-bottom-right-radius: 4px; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .bot { 
            background: rgba(255, 255, 255, 0.06); 
            align-self: flex-start; 
            color: #e2e8f0; 
            border-bottom-left-radius: 4px; 
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 44px; /* Space for action buttons */
        }
        
        .code-container {
            position: relative;
            margin: 10px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bot pre {
            background: #0f172a !important;
            padding: 35px 12px 12px 12px; 
            overflow-x: auto;
            margin: 0;
        }
        .bot code {
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            color: #38bdf8;
            font-size: 0.85rem;
        }
        
        .code-copy-btn {
            position: absolute;
            top: 6px;
            right: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #38bdf8;
            font-size: 0.7rem;
            padding: 3px 6px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .code-copy-btn:hover {
            background: #2563eb;
            color: white;
        }
        
        /* 🔘 Actions Area Wrapper */
        .bot-actions {
            position: absolute;
            bottom: 8px;
            right: 12px;
            display: flex;
            gap: 6px;
        }
        
        .copy-btn, .speak-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .copy-btn:hover, .speak-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }
        
        .speak-btn.playing {
            background: #2563eb !important;
            color: white !important;
        }
        
        .preview-container { 
            display: none; 
            padding: 12px 20px; 
            background: rgba(15, 23, 42, 0.6); 
            align-items: center; 
            gap: 12px; 
            border-top: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .preview-img { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; border: 1px solid #2563eb; }
        .remove-btn { background: #ef4444; border: none; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 0.9rem; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        .remove-btn:hover { background: #dc2626; transform: scale(1.05); }

        .chat-input-area { 
            display: flex; 
            padding: 16px 20px; 
            background: rgba(15, 23, 42, 0.4); 
            gap: 8px; 
            align-items: center; 
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        input[type="text"] { 
            flex: 1; 
            padding: 14px 16px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 12px; 
            color: white; 
            font-size: 0.95rem; 
            transition: 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: #2563eb; background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        
        .attach-btn, .mic-btn { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            color: #94a3b8; 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            transition: 0.2s; 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 45px;
            height: 45px;
        }
        .attach-btn:hover, .mic-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; border-color: rgba(255, 255, 255, 0.2); }
        
        .mic-btn.recording {
            background: #ef4444 !important;
            color: white !important;
            border-color: #ef4444 !important;
            animation: micPulse 1.2s infinite;
        }
        @keyframes micPulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        button.send-btn { 
            background: #2563eb; 
            border: none; 
            color: white; 
            padding: 14px 22px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.95rem;
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        button.send-btn:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3); }
