<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sign In - Mehta.ai</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, #1a1f3a 0%, #0a0a14 50%, #0d1a2e 100%);
    color: #fff;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow-x: hidden;
  }
  .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .orb1 { width: 320px; height: 320px; background: rgba(99,102,241,0.18); top: -100px; left: -80px; }
  .orb2 { width: 280px; height: 280px; background: rgba(59,130,246,0.12); bottom: -80px; right: -60px; }
  .orb3 { width: 200px; height: 200px; background: rgba(245,158,11,0.06); top: 45%; left: 50%; transform: translate(-50%,-50%); }

  .card {
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 36px 30px;
    backdrop-filter: blur(20px);
    position: relative;
    z-index: 1;
  }
  .logo-wrap { display: flex; justify-content: center; margin-bottom: 6px; }
  .logo-wrap img { height: 52px; width: auto; }
  .tagline { text-align: center; color: rgba(255,255,255,0.45); font-size: 13px; margin-top: 4px; margin-bottom: 26px; letter-spacing: 0.3px; }

  .tabs { display: flex; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 3px; margin-bottom: 22px; gap: 3px; }
  .tab { flex: 1; padding: 9px; text-align: center; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; color: rgba(255,255,255,0.4); transition: all 0.2s; border: none; background: transparent; font-family: 'Inter', sans-serif; }
  .tab.active { background: rgba(99,102,241,0.25); color: #c7d2fe; border: 1px solid rgba(99,102,241,0.3); }

  .google-btn {
    width: 100%; padding: 12px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 12px;
    color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.2s; font-family: 'Inter', sans-serif; margin-bottom: 20px;
  }
  .google-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.22); transform: translateY(-1px); }
  .google-btn:active { transform: scale(0.99); }
  .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; }
  .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
  .divider-text { color: rgba(255,255,255,0.3); font-size: 12px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.5); margin-bottom: 6px; letter-spacing: 0.4px; text-transform: uppercase; }
  .field input {
    width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff;
    font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s;
  }
  .field input:focus { border-color: rgba(99,102,241,0.6); background: rgba(99,102,241,0.06); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
  .field input::placeholder { color: rgba(255,255,255,0.2); }

  .submit-btn {
    width: 100%; padding: 13px; background: linear-gradient(135deg,#6366f1,#4f46e5);
    border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
    letter-spacing: 0.2px; margin-top: 4px;
  }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.35); }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

  .switch { text-align: center; margin-top: 18px; font-size: 13px; color: rgba(255,255,255,0.35); }
  .switch a { color: #818cf8; text-decoration: none; cursor: pointer; font-weight: 500; }
  .switch a:hover { color: #a5b4fc; }

  .status-msg { text-align: center; margin-top: 16px; font-size: 13px; min-height: 18px; }
  .status-msg.error { color: #fca5a5; }
  .status-msg.success { color: #86efac; }
  .status-msg.info { color: rgba(255,255,255,0.4); }

  .form-section { display: none; }
  .form-section.visible { display: block; }

  @media (max-width: 380px) {
    .card { padding: 28px 20px; border-radius: 20px; }
  }
</style>
</head>

        <svg class="google-icon" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>

        <svg class="google-icon" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>

      <div class="field"><label>Password</label><input type="password" id="su-pass" placeholder="Min. 6 characters" autocomplete="new-password"/></div>
      <button class="submit-btn" id="signup-submit-btn" onclick="doSignup()">Create Free Account</button>
      <p class="switch">Already have an account? <a onclick="switchTab('login')">Sign in</a></p>
      <div class="status-msg" id="signup-status"></div>

  </div>

<script>
  const supabaseUrl = "https://wrnzwubsaxiizxeppmac.supabase.co";
  const supabaseKey = "sb_publishable_eRF6OFvUXFwwHNRiv1sO4g_yAGoJt2O";
  const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // Agar already logged in hai to seedha chat pe bhejo
  _supabase.auth.getSession().then(({ data: { session } }) => {
    if (session && session.user) {
      window.location.replace("index.html");
    }
  });

  function switchTab(t) {
    document.getElementById("tab-login").classList.toggle("active", t === "login");
    document.getElementById("tab-signup").classList.toggle("active", t === "signup");
    document.getElementById("login-form").classList.toggle("visible", t === "login");
    document.getElementById("signup-form").classList.toggle("visible", t === "signup");
  }

  function setStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = "status-msg " + (type || "info");
  }

  async function doLogin() {
    const email = document.getElementById("login-email").value.trim();
    const pass = document.getElementById("login-pass").value;
    if (!email || !pass) { setStatus("login-status", "Please fill in all fields", "error"); return; }

    const btn = document.getElementById("login-submit-btn");
    btn.disabled = true;
    setStatus("login-status", "Signing in...", "info");

    const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });
    btn.disabled = false;

    if (error) {
      setStatus("login-status", error.message, "error");
      return;
    }
    setStatus("login-status", "Signed in! Redirecting...", "success");
    window.location.replace("index.html");
  }

  async function doSignup() {
    const name = document.getElementById("su-name").value.trim();
    const email = document.getElementById("su-email").value.trim();
    const pass = document.getElementById("su-pass").value;
    if (!name || !email || !pass) { setStatus("signup-status", "Please fill in all fields", "error"); return; }
    if (pass.length < 6) { setStatus("signup-status", "Password must be at least 6 characters", "error"); return; }

    const btn = document.getElementById("signup-submit-btn");
    btn.disabled = true;
    setStatus("signup-status", "Creating account...", "info");

    const { data, error } = await _supabase.auth.signUp({
      email,
      password: pass,
      options: { data: { full_name: name } }
    });
    btn.disabled = false;

    if (error) {
      setStatus("signup-status", error.message, "error");
      return;
    }

    if (data.session) {
      setStatus("signup-status", "Account created! Redirecting...", "success");
      window.location.replace("index.html");
    } else {
      setStatus("signup-status", "Account created! Check your email to confirm, then sign in.", "success");
      setTimeout(() => switchTab("login"), 2500);
    }
  }

  document.getElementById("google-login-btn").addEventListener("click", async () => {
    await _supabase.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.origin + "/index.html" } });
  });
  document.getElementById("google-signup-btn").addEventListener("click", async () => {
    await _supabase.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.origin + "/index.html" } });
  });
</script>
