<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – Mehta AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #1e293b 0%, #0a0f1c 100%);
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: rgba(30, 41, 59, 0.85);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
        }
        .logo { font-size: 2.5rem; margin-bottom: 8px; }
        h1 { font-size: 1.6rem; margin-bottom: 8px; }
        p { color: #94a3b8; margin-bottom: 32px; font-size: 0.95rem; }
        .google-btn {
            background: #ffffff;
            color: #1f2937;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 auto;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .google-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .skip-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: #94a3b8;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            display: block;
            width: fit-content;
            margin: 16px auto 0;
            transition: color 0.15s;
        }
        .skip-btn:hover { color: #f8fafc; }
        .status-msg { margin-top: 20px; font-size: 0.85rem; color: #64748b; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">🤖</div>
    <h1>Mehta AI</h1>
    <p>Your intelligent assistant.<br>Sign in to save your chat history.</p>
    <button class="google-btn" id="google-btn">
        <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google
    </button>
    <button class="skip-btn" id="skip-btn">Continue without login →</button>
    <div class="status-msg" id="status-msg"></div>
</div>

<script>
    const supabaseUrl = "https://wrnzwubsaxiizxeppmac.supabase.co";
    const supabaseKey = "sb_publishable_eRF6OFvUXFwwHNRiv1sO4g_yAGoJt2O";
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // Agar pehle se logged in hai toh seedha chat pe bhejo
    _supabase.auth.getSession().then(({ data: { session } }) => {
        if (session && session.user) {
            window.location.replace('index.html');
        }
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
        document.getElementById('status-msg').innerText = 'Redirecting to Google...';
        await _supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin + '/index.html' }
        });
    });

    document.getElementById('skip-btn').addEventListener('click', () => {
        window.location.replace('index.html');
    });
</script>
</body>
</html>
