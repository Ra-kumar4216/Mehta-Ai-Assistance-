<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mehta.ai — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --navy: #0A0E1A; --indigo: #6C63FF; --ghost: #F0F0FF; }
    body { background: var(--navy); color: var(--ghost); font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; text-align: center; width: 300px; }
    .btn-google { width: 100%; padding: 12px; background: var(--indigo); color: white; border: none; border-radius: 10px; cursor: pointer; }
  </style>
</head>
<body>
<div class="card">
  <h2>Welcome back 👋</h2>
  <button id="googleBtn" class="btn-google">Continue with Google</button>
</div>

<script>
  const supabase = supabase.createClient('https://wrnzwubsaxiizxeppmac.supabase.co', 'sb_publishable_eRF6OFvUXFwwHNRiv1sO4g_yAGoJt2O');

  document.getElementById('googleBtn').addEventListener('click', async () => {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/index.html' }
    });
  });

  // Check agar pehle se login hai, tabhi index par bhejo
  window.onload = async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      localStorage.setItem('user_email', session.user.email);
      window.location.href = 'index.html';
    }
  };
</script>
</body>
</html>
